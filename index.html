<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Auth System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="auth-shell">
    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100 py-4">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
          <div class="auth-card card border-0 shadow-lg">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="brand-mark mx-auto mb-3">
                  <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">Welcome Back</h1>
                <p class="text-secondary mb-0">Sign in to access your dashboard</p>
              </div>

              <form action="dashboard.html" method="get">
                <div class="mb-3">
                  <label for="email" class="form-label fw-medium">Email address</label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    id="email"
                    placeholder="name@example.com"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label fw-medium">Password</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="password"
                    placeholder="Enter your password"
                    required
                  >
                </div>

                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small" for="remember">Remember me</label>
                  </div>
                  <a href="forgot-password.html" class="small text-decoration-none auth-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                  Login
                </button>
              </form>

              <div class="divider my-4">
                <span>or</span>
              </div>

              <p class="text-center mb-0 small">
                New here?
                <a href="register.html" class="fw-semibold text-decoration-none auth-link">Create an account</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
