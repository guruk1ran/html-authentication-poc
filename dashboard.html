<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Navbar -->
<nav class="navbar px-4" style="background:#020617; border-bottom:1px solid #1e293b;">
  <span class="navbar-brand fw-bold text-white">Auth System</span>
  <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

  <!-- Main Content -->
  <div class="container py-5">

    <!-- Welcome -->
    <div class="mb-4">
      <h2 class="fw-bold text-white">Welcome back 👋</h2>
      <p style="color:#94a3b8;">Here’s your dashboard overview</p>
    </div>

    <!-- Cards -->
    <div class="row g-4">

      <!-- Card 1 -->
      <div class="col-md-4">
        <div class="card p-4 shadow-sm">
         <i class="bi bi-person-circle mb-2" style="font-size: 1.6rem; color:#3b82f6;"></i>
          <h5 class="fw-bold">Profile</h5>
          <p>Manage your personal details</p>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="col-md-4">
       <div class="card p-4 shadow-sm">
       <i class="bi bi-shield-lock mb-2" style="font-size: 1.6rem; color:#3b82f6;"></i>
        <h5 class="fw-bold">Security</h5>
      <p>Update password and settings</p>
       </div>
      </div>

      <!-- Card 3 -->
      <div class="col-md-4">
        <div class="card p-4 shadow-sm">
        <i class="bi bi-graph-up mb-2" style="font-size: 1.6rem; color:#3b82f6;"></i>
         <h5 class="fw-bold">Activity</h5>
         <p>View recent activity</p>
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
