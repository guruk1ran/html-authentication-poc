<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">Auth System</span>
    <a href="index.html" class="btn btn-danger btn-sm">Logout</a>
  </nav>

  <!-- Main Content -->
  <div class="container py-5">

    <!-- Welcome -->
    <div class="mb-4">
      <h2 class="fw-bold">Welcome, User 👋</h2>
      <p class="text-secondary">Here’s your dashboard overview</p>
    </div>

    <!-- Cards -->
    <div class="row g-4">

      <!-- Card 1 -->
      <div class="col-md-4">
        <div class="card p-4 shadow-sm">
          <h5 class="fw-bold">Profile</h5>
          <p class="text-muted">Manage your personal details</p>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="col-md-4">
        <div class="card p-4 shadow-sm">
          <h5 class="fw-bold">Security</h5>
          <p class="text-muted">Update password and settings</p>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="col-md-4">
        <div class="card p-4 shadow-sm">
          <h5 class="fw-bold">Activity</h5>
          <p class="text-muted">View recent activity</p>
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
