<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <main class="auth-shell">
    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-12 col-sm-10 col-md-6 col-lg-4">
          <div class="auth-card card shadow-lg">
            <div class="card-body p-4 p-md-5 text-center">

              <!-- Icon -->
              <div class="brand-mark mx-auto mb-3">
                <i class="bi bi-shield-lock-fill"></i>
              </div>

              <!-- Heading -->
              <h2 class="fw-bold mb-2">Reset Password</h2>
              <p class="text-secondary mb-4">
                Enter your new password below.
              </p>

              <!-- Form -->
              <form action="index.html">

                <!-- New Password -->
                <div class="mb-3 text-start position-relative">
                  <label class="form-label">New Password</label>
                  <input type="password" id="password" class="form-control" placeholder="New password" required>
                  <i class="bi bi-eye-slash toggle-eye" onclick="togglePassword('password', this)"></i>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3 text-start position-relative">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                  <i class="bi bi-eye-slash toggle-eye" onclick="togglePassword('confirmPassword', this)"></i>
                </div>

                <!-- Button -->
                <button type="submit" class="btn btn-primary w-100 mb-3">
                  Update Password
                </button>

              </form>

              <!-- Back -->
              <a href="index.html" class="auth-link small">
                ← Back to Login
              </a>

            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- JS -->
  <script>
    function togglePassword(fieldId, icon) {
      const input = document.getElementById(fieldId);

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
      } else {
        input.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
