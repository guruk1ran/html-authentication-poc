<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Auth System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <main class="auth-shell">
    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100 py-4">

        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
          <div class="auth-card card shadow-lg">
            <div class="card-body p-4 p-md-5">

              <!-- Heading -->
              <div class="text-center mb-4">
                <div class="brand-mark mx-auto mb-3">
                  <i class="bi bi-person-plus-fill"></i>
                </div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-secondary mb-0">Fill the details to get started</p>
              </div>

              <!-- Form -->
              <form action="dashboard.html">

                <!-- Name -->
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" placeholder="Create password" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" class="form-control" placeholder="Confirm password" required>
                </div>

                <!-- Terms -->
                <div class="form-check mb-3">
                  <input class="form-check-input" type="checkbox" required>
                  <label class="form-check-label small">
                    I agree to the Terms & Conditions
                  </label>
                </div>

                <!-- Button -->
                <button type="submit" class="btn btn-primary w-100">
                  Create Account
                </button>

              </form>

              <!-- Footer -->
              <p class="text-center mt-4 small">
                Already have an account?
                <a href="index.html" class="auth-link fw-semibold">Login</a>
              </p>

            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
